<!DOCTYPE html>
<html>
<head>
  <title>Pro Mario Game</title>
  <style>
    body { text-align:center; background:#111; color:white; }
    canvas { background:#222; display:block; margin:auto; }
    .controls button {
      padding:12px;
      font-size:16px;
      margin:4px;
    }
  </style>
</head>
<body>

<h3>
Level: <span id="level">1</span> |
Score: <span id="score">0</span> |
Lives: <span id="lives">3</span>
</h3>

<canvas id="game" width="600" height="350"></canvas>

<div class="controls">
  <button ontouchstart="left=true" ontouchend="left=false">??</button>
  <button ontouchstart="right=true" ontouchend="right=false">??</button>
  <button ontouchstart="jump()">??</button>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player = { x:50, y:300, w:30, h:30, vy:0, onGround:false };
let gravity = 0.7;

let left=false, right=false;

let level = 1;
let score = 0;
let lives = 3;

let platforms = [];
let enemies = [];
let coins = [];
let flag = {x:550,y:270};

function loadLevel(lvl){
  platforms = [
    {x:0,y:330,w:600,h:20},
    {x:150,y:260,w:100,h:10},
    {x:350,y:220,w:100,h:10}
  ];

  coins = [
    {x:160,y:230},{x:360,y:190},{x:500,y:300}
  ];

  enemies = [
    {x:250,y:300,w:25,h:25,dir:1,speed:2+lvl},
    {x:400,y:200,w:25,h:25,dir:-1,speed:2+lvl}
  ];

  flag.x = 550;

  document.getElementById("level").innerText = lvl;
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") left=true;
  if(e.key==="ArrowRight") right=true;
  if(e.key==="ArrowUp") jump();
});
document.addEventListener("keyup", e=>{
  if(e.key==="ArrowLeft") left=false;
  if(e.key==="ArrowRight") right=false;
});

function jump(){
  if(player.onGround){
    player.vy = -12;
    player.onGround = false;
  }
}

function update(){
  if(left) player.x -= 4;
  if(right) player.x += 4;

  player.vy += gravity;
  player.y += player.vy;

  player.onGround = false;

  // platform collision
  platforms.forEach(p=>{
    if(
      player.x < p.x+p.w &&
      player.x+player.w > p.x &&
      player.y < p.y+p.h &&
      player.y+player.h > p.y
    ){
      if(player.vy > 0){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  });

  // coins
  coins = coins.filter(c=>{
    if(Math.abs(player.x-c.x)<20 && Math.abs(player.y-c.y)<20){
      score += 10;
      document.getElementById("score").innerText = score;
      return false;
    }
    return true;
  });

  // enemies
  enemies.forEach(e=>{
    e.x += e.speed * e.dir;

    if(e.x<0 || e.x>575) e.dir *= -1;

    if(
      player.x < e.x+e.w &&
      player.x+player.w > e.x &&
      player.y < e.y+e.h &&
      player.y+player.h > e.y
    ){
      if(player.vy>0){
        e.dead=true;
        score+=20;
      } else {
        lives--;
        document.getElementById("lives").innerText = lives;
        player.x=50; player.y=300;

        if(lives<=0){
          alert("Game Over");
          location.reload();
        }
      }
    }
  });

  enemies = enemies.filter(e=>!e.dead);

  // flag win
  if(player.x > flag.x){
    level++;
    if(level>3){
      alert("?? You Completed All Levels!");
      location.reload();
    } else {
      loadLevel(level);
      player.x=50; player.y=300;
    }
  }
}

function draw(){
  ctx.clearRect(0,0,600,350);

  // player
  ctx.fillStyle="lime";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // platforms
  ctx.fillStyle="brown";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  // coins
  ctx.fillStyle="yellow";
  coins.forEach(c=>ctx.fillRect(c.x,c.y,12,12));

  // enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));

  // flag
  ctx.fillStyle="white";
  ctx.fillRect(flag.x,250,10,80);
}

function gameLoop(){
  update();
  draw();
}

loadLevel(1);
setInterval(gameLoop,20);
</script>

</body>
</html>
