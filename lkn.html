<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body { text-align:center; background:#111; color:white; }
    canvas { background:black; display:block; margin:auto; }
    button { padding:10px; margin-top:10px; }
  </style>
</head>
<body>

<h2>Score: <span id="score">0</span></h2>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="restartGame()">Restart</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let box = 20;
let snake, food, direction, score, game;

function startGame(){
  snake = [{x:200,y:200}];
  food = {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
  };
  direction = null;
  score = 0;
  document.getElementById("score").innerText = score;

  if(game) clearInterval(game);
  game = setInterval(draw,100);
}

document.addEventListener("keydown", function(e){
  if(e.keyCode==37) direction="LEFT";
  if(e.keyCode==38) direction="UP";
  if(e.keyCode==39) direction="RIGHT";
  if(e.keyCode==40) direction="DOWN";
});

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,400,400);

  for(let i=0;i<snake.length;i++){
    ctx.fillStyle="lime";
    ctx.fillRect(snake[i].x,snake[i].y,box,box);
  }

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,box,box);

  let snakeX = snake[0].x;
  let snakeY = snake[0].y;

  if(direction=="LEFT") snakeX-=box;
  if(direction=="UP") snakeY-=box;
  if(direction=="RIGHT") snakeX+=box;
  if(direction=="DOWN") snakeY+=box;

  if(snakeX==food.x && snakeY==food.y){
    score++;
    document.getElementById("score").innerText = score;
    food = {
      x: Math.floor(Math.random()*20)*box,
      y: Math.floor(Math.random()*20)*box
    };
  } else {
    snake.pop();
  }

  if(snakeX<0||snakeY<0||snakeX>=400||snakeY>=400){
    clearInterval(game);
    alert("Game Over");
  }

  let newHead = {x:snakeX,y:snakeY};
  snake.unshift(newHead);
}

function restartGame(){
  startGame();
}

startGame();
</script>

</body>
</html>
